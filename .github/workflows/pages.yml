name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Resolve repo basePath
        id: base
        run: echo "path=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
      - name: Compute password hash
        id: pwhash
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          if [ -n "$APP_PASSWORD" ]; then
            HASH=$(printf %s "$APP_PASSWORD" | shasum -a 256 | cut -d' ' -f1)
            echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          else
            echo "hash=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        working-directory: web
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
          NEXT_PUBLIC_APP_PASSWORD_HASH: ${{ steps.pwhash.outputs.hash }}
        run: npm run build
      - name: Add .nojekyll (so Pages serves _next/* untouched)
        run: touch web/out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
